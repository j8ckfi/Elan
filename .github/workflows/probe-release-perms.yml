# TEMPORARY diagnostic — delete once the release token question is settled.
# tauri-action reports only "Resource not accessible by integration" with no
# response body; this calls the same endpoint with the same GITHUB_TOKEN and
# prints the raw status + body, to tell a token problem from an action problem.
name: Probe release perms

on: workflow_dispatch

jobs:
  probe:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: POST a draft release with GITHUB_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          code=$(curl -s -o /tmp/body.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d '{"tag_name":"probe-delete-me","draft":true,"name":"probe"}')
          echo "=== POST /releases -> HTTP $code ==="
          cat /tmp/body.json
          echo
          echo "=== what the token CAN see (GET repo) ==="
          curl -s -o /dev/null -w 'GET /repos -> HTTP %{http_code}\n' \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}"
          echo "=== a different contents:write op (create a ref) ==="
          sha=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/commits/main" \
            | python3 -c 'import sys,json;print(json.load(sys.stdin)["sha"])')
          curl -s -o /tmp/ref.json -w 'POST /git/refs -> HTTP %{http_code}\n' \
            -X POST -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs" \
            -d "{\"ref\":\"refs/tags/probe-delete-me\",\"sha\":\"$sha\"}"
          cat /tmp/ref.json | head -3
          # Clean up whatever landed.
          id=$(python3 -c "import json;print(json.load(open('/tmp/body.json')).get('id',''))" 2>/dev/null || true)
          if [ -n "$id" ]; then
            curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$id"
            echo "cleaned up draft release $id"
          fi
          curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/probe-delete-me" > /dev/null || true
